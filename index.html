<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>App-Mama | Panel de Control de Redes y Canva</title>
    <meta name="description" content="Dashboard de gestión de redes sociales y diseño en Canva para eventos y música en vivo. Diseñado para usabilidad extrema sin conocimientos técnicos." />
    
    <!-- PWA Meta Tags & Manifest -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="App-Mama" />
    <link rel="apple-touch-icon" href="./icon-192.png" />

    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Asistente de Diagnóstico de Errores en Vivo -->
    <script>
      window.addEventListener('error', function(event) {
        const errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.backgroundColor = '#7f1d1d';
        errorDiv.style.color = '#fecaca';
        errorDiv.style.padding = '20px';
        errorDiv.style.zIndex = '99999';
        errorDiv.style.fontFamily = 'monospace';
        errorDiv.style.fontSize = '14px';
        errorDiv.style.boxSizing = 'border-box';
        errorDiv.style.whiteSpace = 'pre-wrap';
        errorDiv.innerHTML = '<strong>❌ ERROR EN CLIENTE (JAVASCRIPT):</strong><br/>' + event.message + '<br/><br/><strong>Stack Trace:</strong><br/>' + (event.error ? event.error.stack : 'No disponible') + '<br/><br/><button onclick="localStorage.clear(); location.reload();" style="background:#ef4444; color:#fff; border:none; padding:8px 14px; border-radius:6px; font-weight:bold; cursor:pointer; margin-top:10px;">Forzar Limpieza de Historial y Recargar</button>';
        document.body.appendChild(errorDiv);
      });
      window.addEventListener('unhandledrejection', function(event) {
        const errorDiv = document.createElement('div');
        errorDiv.style.position = 'fixed';
        errorDiv.style.top = '0';
        errorDiv.style.left = '0';
        errorDiv.style.width = '100%';
        errorDiv.style.backgroundColor = '#7f1d1d';
        errorDiv.style.color = '#fecaca';
        errorDiv.style.padding = '20px';
        errorDiv.style.zIndex = '99999';
        errorDiv.style.fontFamily = 'monospace';
        errorDiv.style.fontSize = '14px';
        errorDiv.style.boxSizing = 'border-box';
        errorDiv.style.whiteSpace = 'pre-wrap';
        errorDiv.innerHTML = '<strong>❌ PROMESA RECHAZADA (UNHANDLED REJECTION):</strong><br/>' + event.reason;
        document.body.appendChild(errorDiv);
      });

      // Capturar errores de carga de recursos (como scripts JS en caché que dan 404 tras un nuevo despliegue)
      window.addEventListener('error', function(event) {
        if (event.target && (event.target.tagName === 'SCRIPT' || event.target.tagName === 'LINK')) {
          console.warn('Error al cargar recurso (posible desfase de caché PWA):', event.target.src || event.target.href);
          
          if (!document.getElementById('pwa-update-banner')) {
            const updateDiv = document.createElement('div');
            updateDiv.id = 'pwa-update-banner';
            updateDiv.style.position = 'fixed';
            updateDiv.style.bottom = '20px';
            updateDiv.style.left = '50%';
            updateDiv.style.transform = 'translateX(-50%)';
            updateDiv.style.backgroundColor = '#7c3aed';
            updateDiv.style.color = '#ffffff';
            updateDiv.style.padding = '16px 24px';
            updateDiv.style.borderRadius = '16px';
            updateDiv.style.boxShadow = '0 10px 25px -5px rgba(124, 58, 237, 0.4)';
            updateDiv.style.zIndex = '99999';
            updateDiv.style.fontFamily = 'sans-serif';
            updateDiv.style.fontSize = '14px';
            updateDiv.style.fontWeight = 'bold';
            updateDiv.style.textAlign = 'center';
            updateDiv.style.boxSizing = 'border-box';
            updateDiv.style.display = 'flex';
            updateDiv.style.flexDirection = 'column';
            updateDiv.style.gap = '8px';
            updateDiv.style.maxWidth = '90%';
            updateDiv.style.width = '350px';
            
            updateDiv.innerHTML = '<span>⚡ ¡Nueva versión de App-Mama disponible!</span><button onclick="caches.keys().then(names => Promise.all(names.map(name => caches.delete(name)))).then(() => { navigator.serviceWorker.getRegistrations().then(regs => { for(let reg of regs) { reg.unregister(); } }); location.reload(true); })" style="background:#ffffff; color:#7c3aed; border:none; padding:10px 14px; border-radius:10px; font-weight:bold; cursor:pointer; transition: all 0.2s;">Actualizar y Cargar Nueva Versión</button>';
            document.body.appendChild(updateDiv);
          }
        }
      }, true); // Usar captura para atrapar errores de elementos descendientes (recursos)
    </script>
    <script type="module" crossorigin src="./assets/index-BD_bEYdf.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BFY7cznS.css">
  </head>
  <body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased selection:bg-purple-500 selection:text-white">
    <div id="root"></div>
  </body>
</html>
