<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <linearGradient id="amberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Main calendar body -->
  <rect x="4" y="8" width="40" height="36" rx="8" fill="url(#purpleGradient)" />
  
  <!-- Header bar -->
  <path d="M4 16c0-4.418 3.582-8 8-8h24c4.418 0 8 3.582 8 8v4H4v-4z" fill="#4f46e5" opacity="0.3" />
  
  <!-- Binders/Rings -->
  <rect x="12" y="3" width="4" height="10" rx="2" fill="#ffffff" />
  <rect x="32" y="3" width="4" height="10" rx="2" fill="#ffffff" />
  
  <!-- Grid layout (dots for dates) -->
  <circle cx="13" cy="24" r="2.5" fill="#ffffff" opacity="0.9" />
  <circle cx="24" cy="24" r="2.5" fill="#ffffff" opacity="0.9" />
  <circle cx="35" cy="24" r="2.5" fill="#ffffff" opacity="0.9" />
  
  <circle cx="13" cy="34" r="2.5" fill="#ffffff" opacity="0.9" />
  <!-- Today's date highlighted in amber/orange -->
  <rect x="20.5" y="30.5" width="7" height="7" rx="2" fill="url(#amberGradient)" />
  <circle cx="35" cy="34" r="2.5" fill="#ffffff" opacity="0.9" />
</svg>